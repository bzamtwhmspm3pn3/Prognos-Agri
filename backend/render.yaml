services:
  - type: web
    name: prognos-agri-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://prognos-agri.onrender.com
      - key: PYTHON_API_URL
        value: https://prognos-agri-python.onrender.com

  - type: web
    name: prognos-agri-python
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r python/requirements.txt
    startCommand: python python/api/app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_UNBUFFERED
        value: "1"

  - type: web
    name: prognos-agri-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve -s frontend/build -l $PORT
    rootDir: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
